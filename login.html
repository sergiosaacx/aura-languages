*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'Open Sans',sans-serif;
  color:#f0ede6;
  background:#08071a;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* FONDO ANIMADO */
.bg{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.18;
  animation:drift 12s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1){width:600px;height:600px;background:#7c3aed;top:-150px;left:-100px;animation-duration:14s;}
.bg-orb:nth-child(2){width:500px;height:500px;background:#a855f7;bottom:-100px;right:-100px;animation-duration:10s;animation-delay:-4s;}
.bg-orb:nth-child(3){width:300px;height:300px;background:#e879f9;top:40%;left:40%;animation-duration:8s;animation-delay:-2s;opacity:0.10;}

/* Grid pattern */
.bg-grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(168,85,247,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,.04) 1px, transparent 1px);
  background-size:40px 40px;
}

@keyframes drift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(40px,30px) scale(1.1);}
}

/* CARD */
.card{
  position:relative;
  z-index:1;
  width:420px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(168,85,247,.25);
  border-radius:28px;
  padding:44px 40px 40px;
  backdrop-filter:blur(24px);
  box-shadow:0 40px 80px rgba(0,0,0,.6), 0 0 60px rgba(168,85,247,.08);
  animation:fadeUp .5s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* LOGO */
.logo-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:28px;
}
.logo-a{
  font-family:'Airstrike',sans-serif;
  font-size:2.4rem;
  color:#a855f7;
  line-height:1;
  filter:drop-shadow(0 0 16px rgba(168,85,247,.5));
}
.logo-name{
  font-family:'Airstrike',sans-serif;
  font-size:1.4rem;
  color:#f0ede6;
  letter-spacing:0.06em;
  line-height:1;
}

/* TÍTULO */
.title{
  font-family:'Inter',sans-serif;
  font-size:1.5rem;
  font-weight:800;
  text-align:center;
  color:#f0ede6;
  margin-bottom:6px;
}
.subtitle{
  font-size:0.82rem;
  color:rgba(255,255,255,.38);
  text-align:center;
  margin-bottom:32px;
}

/* TABS */
.tabs{
  display:flex;
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}
.tab{
  flex:1;
  padding:8px;
  text-align:center;
  font-size:0.82rem;
  font-weight:600;
  border-radius:9px;
  cursor:pointer;
  color:rgba(255,255,255,.35);
  transition:all .22s;
  border:none;
  background:none;
}
.tab.active{
  background:rgba(168,85,247,.2);
  color:#c084fc;
  border:1px solid rgba(168,85,247,.3);
}

/* INPUTS */
.field{
  margin-bottom:14px;
}
.field label{
  display:block;
  font-size:0.75rem;
  font-weight:600;
  color:rgba(255,255,255,.45);
  margin-bottom:6px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.field input{
  width:100%;
  padding:12px 16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  color:#f0ede6;
  font-size:0.9rem;
  font-family:'Open Sans',sans-serif;
  outline:none;
  transition:border-color .22s, box-shadow .22s;
}
.field input:focus{
  border-color:rgba(168,85,247,.5);
  box-shadow:0 0 0 3px rgba(168,85,247,.1);
}
.field input::placeholder{color:rgba(255,255,255,.2);}

/* FORGOT */
.forgot{
  text-align:right;
  margin-bottom:20px;
  margin-top:-6px;
}
.forgot a{
  font-size:0.75rem;
  color:rgba(168,85,247,.7);
  text-decoration:none;
  transition:color .2s;
}
.forgot a:hover{color:#a855f7;}

/* BTN PRINCIPAL */
.btn-main{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff;
  font-family:'Open Sans',sans-serif;
  font-size:0.95rem;
  font-weight:700;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s, box-shadow .18s;
  box-shadow:0 8px 24px rgba(124,58,237,.35);
  margin-bottom:18px;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.5);}
.btn-main:active{transform:translateY(0);}
.btn-main::after{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  animation:sweep 3s ease infinite;
}
@keyframes sweep{
  0%{left:-100%;}
  50%,100%{left:150%;}
}

/* DIVIDER */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(255,255,255,.08);
}
.divider span{
  font-size:0.72rem;
  color:rgba(255,255,255,.25);
  white-space:nowrap;
}

/* BTN GOOGLE */
.btn-google{
  width:100%;
  padding:12px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.7);
  font-family:'Open Sans',sans-serif;
  font-size:0.88rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all .22s;
}
.btn-google:hover{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.22);
  color:#f0ede6;
}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}

/* MENSAJE ERROR/EXITO */
.msg{
  display:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:0.8rem;
  font-weight:600;
  margin-bottom:14px;
  text-align:center;
}
.msg.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.msg.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.msg.show{display:block;}

/* LOADING SPINNER */
.spinner{
  display:none;
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-grid"></div>
</div>

<div class="card">

  <!-- LOGO -->
  <div class="logo-wrap">
    <span class="logo-a">A</span>
    <span class="logo-name">AURA LANGUAGES</span>
  </div>

  <div class="title">Bienvenido de nuevo</div>
  <div class="subtitle">Continúa tu camino al inglés fluido</div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
  </div>

  <!-- MENSAJE -->
  <div class="msg" id="msg"></div>

  <!-- FORMULARIO LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Correo</label>
      <input type="email" id="login-email" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>
    <button class="btn-main" onclick="doLogin()" id="btn-login">
      <span id="btn-login-txt">Entrar</span>
      <div class="spinner" id="spin-login"></div>
    </button>
  </div>

  <!-- FORMULARIO REGISTRO -->
  <div id="form-register" style="display:none;">
    <div style="display:flex;gap:10px;">
      <div class="field" style="flex:1">
        <label>Nombre</label>
        <input type="text" id="reg-nombre" placeholder="Tu nombre">
      </div>
      <div class="field" style="flex:1">
        <label>Apellido</label>
        <input type="text" id="reg-apellido" placeholder="Tu apellido">
      </div>
    </div>
    <div class="field">
      <label>Correo</label>
      <input type="email" id="reg-email" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="btn-main" onclick="doRegister()" id="btn-register">
      <span id="btn-register-txt">Crear cuenta</span>
      <div class="spinner" id="spin-register"></div>
    </button>
  </div>

  <!-- DIVIDER + GOOGLE -->
  <div class="divider"><span>o continúa con</span></div>
  <button class="btn-google" onclick="doGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar con Google
  </button>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://vceuxruenbepzflopkbw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5ZVQnLFhMRYxbI2D77LTxg_WaNPhdUV';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ---- HELPERS ----
function showMsg(txt, type){
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + type + ' show';
}
function hideMsg(){ document.getElementById('msg').className = 'msg'; }

function setLoading(btn, spin, loading){
  document.getElementById(btn).style.display = loading ? 'none' : 'block';
  document.getElementById(spin).style.display = loading ? 'block' : 'none';
}

// ---- TABS ----
window.switchTab = function(tab){
  hideMsg();
  document.getElementById('form-login').style.display   = tab==='login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('tab-login').className    = 'tab' + (tab==='login'    ? ' active' : '');
  document.getElementById('tab-register').className = 'tab' + (tab==='register' ? ' active' : '');
}

// ---- LOGIN ----
window.doLogin = async function(){
  hideMsg();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if(!email || !pass){ showMsg('Completa todos los campos', 'error'); return; }
  setLoading('btn-login-txt','spin-login', true);
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login-txt','spin-login', false);
  if(error){ showMsg(error.message, 'error'); }
  else { showMsg('¡Bienvenido! Redirigiendo...', 'success'); setTimeout(()=>{ window.location.href='dashboard.html'; }, 1000); }
}

// ---- REGISTRO ----
window.doRegister = async function(){
  hideMsg();
  const nombre   = document.getElementById('reg-nombre').value.trim();
  const apellido = document.getElementById('reg-apellido').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const pass     = document.getElementById('reg-pass').value;
  if(!nombre || !apellido || !email || !pass){ showMsg('Completa todos los campos', 'error'); return; }
  if(pass.length < 6){ showMsg('La contraseña debe tener mínimo 6 caracteres', 'error'); return; }
  setLoading('btn-register-txt','spin-register', true);
  const { error } = await supabase.auth.signUp({
    email, password: pass,
    options: { data: { full_name: nombre + ' ' + apellido } }
  });
  setLoading('btn-register-txt','spin-register', false);
  if(error){ showMsg(error.message, 'error'); }
  else { showMsg('¡Cuenta creada! Revisa tu correo para confirmar.', 'success'); }
}

// ---- GOOGLE ----
window.doGoogle = async function(){
  hideMsg();
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if(error){ showMsg(error.message, 'error'); }
}

// ---- SESIÓN ACTIVA → REDIRIGIR ----
supabase.auth.getSession().then(({ data: { session } }) => {
  if(session) window.location.replace('dashboard.html');
});
</script>
</body>
</html>
