services:
  - type: web
    name: aura-stream-api
    env: node
    rootDir: stream-api
    buildCommand: apt-get install -y ffmpeg 2>/dev/null || true && npm install && pip3 install -U yt-dlp
    startCommand: node server.js
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GH_TOKEN
        sync: false
